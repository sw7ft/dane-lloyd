<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName dane.sw7ft.com
    DocumentRoot /home/dane.sw7ft.com/public_html

    <Directory /home/dane.sw7ft.com/public_html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/dane.sw7ft.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/dane.sw7ft.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ErrorLog ${APACHE_LOG_DIR}/dane.sw7ft.com-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/dane.sw7ft.com-ssl-access.log combined
</VirtualHost>
</IfModule>
